<!DOCTYPE html>
<html>
<body>
    <button id="bt1" onclick="test()">Multiply</button>
    <button id="bt2" onclick="test2()">Add</button>
    <button id="bt3" onclick="test3()">Subtract</button>
    <button id="bt4" onclick="test4()">Divide</button>
    <script>
         let a = 10;
        let b = 20;
        function test() {
           
            let c = a * b;
            console.log("multiplication result: " + c);
        }

        function test2() {

            let c = a + b;
            console.log("addition result: " + c);
        }

        function test3() {

            let c = a - b;
            console.log("subtraction result: " + c);
        }
        function test4() {
            let c = a / b;
            console.log("division result: " + c);
        }

    </script>
</body>
</html>
