<!DOCTYPE html>
<html>
<head>
    <title>User Profile Cards</title>

     <style>
        .container{
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .card{
            width: 200px;
            padding: 15px;
            border: 1px solid black;
            border-radius: 10px;
            background-color: #f2f2f2;
        }

        .card h3{
            margin: 5px 0;
        }
    </style>
</head>

<body>

<h2>User Profile Cards</h2>

<div class="container" id="cardContainer"></div>

<script>

    // 5 user profiles (array of objects)
    const users = [
        {name:"Chaitanya", age:19, city:"Mumbai",role:"Student",email:"cha@gmail.com"},
        {name:"Rahul",age:20, city:"Pune", role:"Developer",email:"rahul@gmail.com"},
        {name:"Sneha", age:21, city:"Nashik", role:"Designer", email:"sneha@gmail.com"},
        {name:"Amit", age:22, city:"Nagpur", role:"Engineer", email:"amit@gmail.com"},
        {name:"Priya", age:20, city:"Thane", role:"Tester", email:"priya@gmail.com"}
    ];

    let container = document.getElementById("cardContainer");

    // loop through each user
    for(let user of users){

        let card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>${user.name}</h3>
            <p><b>Age:</b> ${user.age}</p>
            <p><b>City:</b> ${user.city}</p>
            <p><b>Role:</b> ${user.role}</p>
            <p><b>Email:</b> ${user.email}</p>
        `;

        container.appendChild(card);
    }

</script>

</body>
</html>
