<!DOCTYPE html>
<html>
<head>
    <title>Prime Number</title>
</head>
<body>

<h2>Check Prime Number</h2>

<script>

let num = prompt("Enter a number:");   // Number to check 
let count = 0;

for(let i = 1; i <= num; i++)
{
    if(num % i == 0)
    {
        count++;
    }
}

if(count == 2)
{
    document.write(num + " is a Prime Number");
}
else
{
    document.write(num + " is Not a Prime Number");
}

</script>

</body>
</html>
