<!DOCTYPE html>
<html>
<head>
    <title>Ternary Operator User Input</title>
</head>

<body>

<h2>Check Number</h2>

<script>

let num = prompt("Enter a number:");

let result = (num % 2 == 0) 
             ? "Even Number" 
             : "Odd Number";

document.write("Number: " + num + "<br>");
document.write("Result: " + result);

</script>

</body>
</html>
