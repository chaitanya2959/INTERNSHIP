<!DOCTYPE html>
<html>
<head>
    <title>Sum of First N Numbers</title>
</head>
<body>

<h2>Sum of First N Numbers</h2>

<script>

let n = prompt("Enter the value of N:");   // First N number
let sum = 0;

for(let i = 1; i <= n; i++)
{
    sum = sum + i;
}

document.write("Sum of first " + n + " numbers is: " + sum);

</script>

</body>
</html>
