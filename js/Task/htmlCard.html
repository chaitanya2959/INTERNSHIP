<!DOCTYPE html>
<html>
<head>
<title>HTML Card</title>

<style>

.card {
    width: 300px;
    padding: 20px;
    margin: 50px auto;
    background-color: lightblue;
    border-radius: 15px;
    box-shadow: 0px 0px 10px gray;
    text-align: center;
}

.card img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
}

.card h2 {
    color: darkblue;
}

.card p {
    font-size: 18px;
}

.button {
    background-color: blue;
    color: white;
    padding: 10px 20px;
    border-radius: 5px;
    text-decoration: none;
}

</style>

</head>

<body>

<div class="card">

<img src="https://via.placeholder.com/100">

<h2>Chaitanya Lakade</h2>

<p>
Computer Engineering Student<br>
Java | Python | Web Development
</p>

<a href="#" class="button">View More</a>

</div>

</body>
</html>
