<!DOCTYPE html>
<html>
<head>
    <title>Array Example</title>
</head>
<body> 
    <table id="stable" border="l ">
        <tr>
            <th>Rollno</th>
            <th>Name</th>
        </tr>
    </table>
        
</body>
<script>
    let Sname=["Virat","Mangesh","Maanya","Chaitanya","Parth","Krushna","Radha"]
    let output= "";
    for(let i=0;i<Sname.length;i++){
        output +="<tr>";
        output +="<td>"+(i+1)+"</td>";
        output+="<td>"+Sname[i]+"</td>";
        output+="</tr>";
    }
    document.getElementById("stable").innerHTML += output;
</script>
</html>
